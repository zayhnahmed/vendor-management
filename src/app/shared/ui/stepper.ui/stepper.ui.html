<div class="min-h-screen flex justify-center p-6">
  <div class="w-full max-w-5xl">
    <!-- Main White Card with background #FEFCFC and custom shadow -->
    <div class="bg-[#FEFCFC] rounded-xl shadow-[0_4px_4px_0_rgba(0,0,0,0.25)] z-10">
      <!-- STEPPER - Full width with no horizontal padding -->
      <div class="bg-[#FEFCFC] rounded-xl w-full pt-2 sticky top-0 z-10">
        <!-- Steps Container with horizontal padding only for content -->
        <div class="px-8 h-16">
          <div class="flex items-center justify-between w-full text-sm h-full">
            @for (step of steps; track step; let i = $index) {
              <div
                class="flex border-b-[3px] h-full items-center gap-2 cursor-pointer"
                (click)="selectStepByIndex(i)"
                [ngClass]="{
                  'border-b-brand': selectedIndex === i,
                  'border-b-transparent': selectedIndex !== i,
                }"
              >
                <div
                  class="w-7 h-7 rounded-full text-white flex items-center justify-center text-xs font-semibold"
                  [ngClass]="{
                    'bg-brand': selectedIndex === i,
                    'bg-gray-600': selectedIndex !== i,
                  }"
                >
                  {{ i + 1 }}
                </div>
                <span
                  class="font-medium"
                  [ngClass]="{
                    'text-brand': selectedIndex === i,
                    'text-gray-600': selectedIndex !== i,
                  }"
                  >{{ step.label }}</span
                >
              </div>
            }
          </div>
        </div>

        <!-- Progress Bar - Full width, no padding, spans entire container -->
        <div class="relative h-0.5 bg-gray-200 w-full"></div>
      </div>

      <div [ngTemplateOutlet]="selected ? selected.content : null"></div>
    </div>
  </div>
</div>
