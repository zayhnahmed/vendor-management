<div
  class="min-h-screen bg-linear-to-br from-gray-50 to-gray-100 flex items-center justify-center p-4"
>
  <div class="w-full max-w-lg">
    <!-- Animated Card -->
    <div class="relative">
      <!-- Decorative Elements -->
      <div
        class="absolute -top-10 -left-10 w-32 h-32 bg-brand-100 rounded-full opacity-50 blur-2xl animate-pulse"
      ></div>
      <div
        class="absolute -bottom-10 -right-10 w-32 h-32 bg-brand-100 rounded-full opacity-50 blur-2xl animate-pulse"
      ></div>

      <!-- Main Card -->
      <div class="relative bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Top Accent Bar -->
        <div class="h-2 bg-linear-to-r from-brand-500 to-brand-800"></div>

        <div class="p-8 sm:p-10 text-center">
          <!-- 404 Number with Animation -->
          <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-32 h-32 bg-brand-100 rounded-full blur-2xl opacity-60"></div>
            </div>
            <div class="relative">
              <h1 class="text-8xl sm:text-9xl font-black text-gray-800 tracking-tighter">404</h1>
              <div
                class="absolute -top-2 -right-2 w-8 h-8 bg-brand-500 rounded-full animate-ping opacity-75"
              ></div>
            </div>
          </div>

          <!-- Title -->
          <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-3">Page Not Found</h2>

          <!-- Message -->
          <p class="text-gray-600 mb-6 leading-relaxed">
            Oops! The page you're looking for doesn't exist or has been moved.
          </p>

          <!-- Action Buttons -->
          <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button
              onclick="history.back()"
              class="px-6 py-2.5 border-2 border-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-50 transition-all duration-200 flex items-center justify-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linecap="round"
                  d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"
                />
              </svg>
              Go Back
            </button>

            <a
              href="/"
              class="px-6 py-2.5 bg-brand-600 text-white font-medium rounded-xl hover:bg-brand-800 transition-all duration-200 shadow-md hover:shadow-lg flex items-center justify-center gap-2"
            >
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linecap="round"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                />
              </svg>
              Back to Home
            </a>
          </div>

          <!-- Help Text -->
          <p class="text-xs text-gray-400 mt-6">
            Try checking the URL or
            <a href="/contact" class="text-brand-600 hover:underline">contact support</a> if you need
            help
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
