<div class="p-6">
  <h2 class="text-2xl font-bold mb-6">Application Requests</h2>

  <app-mdatatable
    [data]="(requests$ | async) ?? []"
    [config]="tableConfig"
    (rowClick)="handleRowClick($event)"
    (actionClick)="handleActionClick($event)"
    (pageChange)="onPageChange($event)"
  >
  </app-mdatatable>
</div>
