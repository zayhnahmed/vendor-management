<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-4xl">
    <!-- Header with larger, bolder text -->
    <div class="text-center mb-10">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Select User Type</h2>
      <p class="text-base text-gray-500">Choose how you want to continue in the portal</p>
    </div>

    <!-- Cards with dashboard styling -->
    <div class="grid md:grid-cols-2 gap-6">
      <!-- Buyer Card -->
      <div
        class="bg-white rounded-xl border border-gray-100 shadow-sm p-7 hover:shadow-md transition-all cursor-pointer"
      >
        <div class="space-y-5">
          <!-- Icon with badge-like background - larger -->
          <div
            class="w-20 h-20 p-4 rounded-lg bg-brand/5 flex items-center justify-center text-2xl text-brand"
          >
            <img src="icons/buyer.png" alt="Buyer" />
          </div>

          <div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">Buyer</h3>
            <p class="text-base text-gray-500 leading-relaxed">
              Manage purchase requests, approve vendors, and track procurement activities.
            </p>
          </div>

          <!-- Navigation buttons -->
          <div class="flex justify-end pt-3">
            <button appVendButton size="sm" borderRadius="rounded-xl">Continue</button>
          </div>
        </div>
      </div>

      <!-- Supplier Card -->
      <div
        class="bg-white rounded-xl border border-gray-100 shadow-sm p-7 hover:shadow-md transition-all cursor-pointer"
      >
        <div class="space-y-5">
          <!-- Icon with badge-like background - larger -->
          <div
            class="w-20 h-20 p-4 rounded-lg bg-brand/5 flex items-center justify-center text-2xl text-brand"
          >
            <img src="icons/seller.png" alt="Seller" />
          </div>

          <div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">Supplier</h3>
            <p class="text-base text-gray-500 leading-relaxed">
              Submit quotations, manage orders, track invoices, and receive payments.
            </p>
          </div>

          <!-- Navigation buttons -->
          <div class="flex justify-end pt-3">
            <button
              routerLink="login/supplier"
              appVendButton
              size="sm"
              borderRadius="rounded-xl"
            >
              Continue
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
